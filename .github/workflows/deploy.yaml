name: Deploy
run-name: Deploy ${{ inputs.image_tag }} to ${{ inputs.environment }}

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: The image tag to deploy
        required: true
env:
  AWS_REGION: eu-west-1
  AWS_IAM_ROLE_ARN: arn:aws:iam::486055879181:role/github-oidc
  AWS_CONTAINER_REGISTRY: ${{ vars.AWS_CONTAINER_REGISTRY }}
  IMAGE_NAME: ${{ vars.AWS_CONTAINER_REGISTRY }}/${{ github.repository }}
  DISPATCH_ENVIRONMENT: prod

  GH_APP_ADVENA_BUILDBOT_GITHUB_ID: ${{ vars.GH_APP_ADVENA_BUILDBOT_GITHUB_ID }}
  GH_APP_ADVENA_BUILDBOT_GITHUB_PRIVATE_KEY: ${{ secrets.GH_APP_ADVENA_BUILDBOT_GITHUB_PRIVATE_KEY }}
  DISPATCH_REPO: ${{ github.repository_owner }}/advena-deployments
  DISPATCH_EVENT_TYPE: ${{ github.repository }}

  IMAGE_TAG: ${{ inputs.image_tag }}

jobs:
  dispatch:
    name: Dispatch Workflow

    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Add summary to Github workflow UI
        run: |
          REPO="$(echo ${{ github.repository }} | cut -d '/' -f 2)"
          echo "## Dispatching deploy event to ${{ env.DISPATCH_ENVIRONMENT }} environment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Track deploy status at (https://github.com/${{ env.DISPATCH_REPO }}/actions/workflows/${REPO}.yaml)" >> $GITHUB_STEP_SUMMARY

      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: Iv23li2FKiZJ5nquN6XR
          private-key: ${{ secrets.GH_APP_ADVENA_BUILDBOT_GITHUB_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Dispatch deploy event to ${{ env.DISPATCH_ENVIRONMENT }} environment
        uses: peter-evans/repository-dispatch@v4
        with:
          repository: ${{ env.DISPATCH_REPO }}
          token: ${{ steps.app-token.outputs.token }}
          # event-type: ${{ env.DISPATCH_EVENT_TYPE }}
          event-type: "update-docker-image"
          client-payload: |
            {
              "namespace": "app-tokatiti-${{ env.DISPATCH_ENVIRONMENT}}",
              "app": "tokatiti-${{ env.DISPATCH_ENVIRONMENT}}",
              "image_name": "${{ env.IMAGE_NAME }}",
              "image_tag": "${{ env.IMAGE_TAG }}",

              "app_repository": "${{ github.server_url }}/${{ github.repository }}|${{ github.repository }}",

              "app_commit": "${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}",

              "app_tag": "${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}|${{ github.ref_name }}",

              "app_workflow": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",

              "triggered_by": "${{ github.actor }}"
            }
