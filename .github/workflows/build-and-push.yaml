name: Build and Push

on:
  push:
    tags:
      - 'v*'
    paths-ignore:
    - '.github/**'
    - '**/README*.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: false

env:
  AWS_REGION: eu-west-1
  AWS_IAM_ROLE_ARN: arn:aws:iam::486055879181:role/github-oidc
  AWS_CONTAINER_REGISTRY: ${{ vars.AWS_CONTAINER_REGISTRY }}
  IMAGE_NAME: ${{ vars.AWS_CONTAINER_REGISTRY }}/${{ github.repository }}
  DISPATCH_ENVIRONMENT: dev

  GH_APP_ADVENA_BUILDBOT_GITHUB_ID: ${{ vars.GH_APP_ADVENA_BUILDBOT_GITHUB_ID }}
  GH_APP_ADVENA_BUILDBOT_GITHUB_PRIVATE_KEY: ${{ secrets.GH_APP_ADVENA_BUILDBOT_GITHUB_PRIVATE_KEY }}
  DISPATCH_REPO: ${{ github.repository_owner }}/advena-deployments
  DISPATCH_EVENT_TYPE: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build and Push
    runs-on: ubuntu-latest
    timeout-minutes: 30
    # IMPORTANT: These permissions are required for OIDC connection
    permissions:
      contents: 'read'
      id-token: 'write'
    
    outputs:
      image_tag: ${{ steps.set-outputs.outputs.image_tag }}

    steps:
      - name: Checkout code from the repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.AWS_IAM_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to AWS ECR
        uses: aws-actions/amazon-ecr-login@v2

 
      - name: Build container image
        uses: docker/build-push-action@v7
        env:
          DOCKER_BUILD_SUMMARY: false
        with:
          context: .
          push: true
          load: true
          tags: "${{ env.IMAGE_NAME }}:${{ github.ref_name }}"
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Set outputs for the dispatch job
      - name: Set outputs for the dispatch job
        id: set-outputs
        run: |
            echo "image_tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT

      - name: Print pushed image tag
        run: |
            echo "Dispatch image with tag: ${{ steps.set-outputs.outputs.image_tag }}"

  dispatch:
    name: Dispatch deploy
    needs: [build-and-push]

    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:

      - name: Print dispatch information
        run: |
          echo "Dispatching deploy event to ${{ env.DISPATCH_ENVIRONMENT }} environment with image tag: ${{ needs.push.outputs.image_tag }}"

      - uses: actions/create-github-app-token@v3
        id: app-token
        with:
          client-id: Iv23li2FKiZJ5nquN6XR
          private-key: ${{ secrets.GH_APP_ADVENA_BUILDBOT_GITHUB_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Add summary to Github workflow UI
        run: |
          REPO="$(echo ${{ github.repository }} | cut -d '/' -f 2)"
          echo "## Dispatching deploy event to ${{ env.DISPATCH_ENVIRONMENT }} environment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Track deploy status at (https://github.com/${{ env.DISPATCH_REPO }}/actions/workflows/${REPO}.yaml)" >> $GITHUB_STEP_SUMMARY
  
      - name: Dispatch deploy event to ${{ env.DISPATCH_ENVIRONMENT }} environment
        uses: peter-evans/repository-dispatch@v4
        with:
          repository: ${{ env.DISPATCH_REPO }}
          token: ${{ steps.app-token.outputs.token }}
          # event-type: ${{ env.DISPATCH_EVENT_TYPE }}
          event-type: "update-docker-image"
          client-payload: |
            {
              "namespace": "app-sanja-dev",
              "app": "sanja-dev",
              "image_name": "${{ env.IMAGE_NAME }}",
              "image_tag": "${{ needs.build-and-push.outputs.image_tag }}",

              "app_repository": "${{ github.server_url }}/${{ github.repository }}|${{ github.repository }}",

              "app_commit": "${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}",

              "app_tag": "${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ github.ref_name }}|${{ github.ref_name }}",

              "app_workflow": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}",

              "triggered_by": "${{ github.actor }}"
            }
